<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biparit | Dissapointment-as-a-Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent-cyan: #00f2ff;
            --accent-purple: #7000ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: radial-gradient(circle at top right, #1a1a2e, #050505);
            color: #e0e0e0; 
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }

        .main-container {
            transition: opacity 0.5s ease;
        }

        .hero-title {
            font-size: 4rem;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-input { 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            border-radius: 12px; 
            padding: 18px;
            font-size: 1.1rem;
        }

        .glass-input:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            color: white;
        }

        .modern-btn { 
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            color: black;
            border-radius: 12px; 
            font-weight: 800; 
            padding: 0 40px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .modern-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
            color: white;
        }

        /* Sophisticated Loader */
        #loader {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .ai-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top: 2px solid var(--accent-cyan);
            border-bottom: 2px solid var(--accent-purple);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: monospace;
            color: var(--accent-cyan);
            margin-top: 20px;
            min-height: 1.5em;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container main-container" id="main-ui">
        <div class="row justify-content-center">
            <div class="col-lg-8 text-center glass-card">
                <h1 class="hero-title fw-bold mb-2">BIPARIT</h1>
                <p class="text-secondary mb-5 fs-5">Harnessing Neural Disappointment Engines™</p>
                
                <div id="interaction-area">
                    <p class="mb-3 opacity-75">Predict the digital reality of this space:</p>
                    <div class="input-group mb-4">
                        <input type="text" id="userGuess" class="form-control glass-input" placeholder="e.g. A peaceful Zen garden portfolio">
                        <button class="btn modern-btn" id="goBtn" onclick="generateOpposite()">Initialize Reveal</button>
                    </div>
                </div>

                <div id="loader">
                    <div class="ai-ring"></div>
                    <div id="status-msg" class="loading-text mt-3">Rerouting cognitive buffers...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const statusMessages = [
            "Analyzing your hopes and dreams...",
            "Calculating maximum irony vectors...",
            "Optimizing for emotional damage...",
            "Subverting expectations at 10Gbps...",
            "Consulting the oracle of disappointment...",
            "Injecting Bootstrap into your reality...",
            "Almost there, don't get excited..."
        ];

        let messageInterval;

        function updateStatus() {
            const msgElement = document.getElementById('status-msg');
            msgElement.innerText = statusMessages[Math.floor(Math.random() * statusMessages.length)];
        }

        async function generateOpposite() {
            const guess = document.getElementById('userGuess').value;
            const interactionArea = document.getElementById('interaction-area');
            const loader = document.getElementById('loader');
            const mainContainer = document.getElementById('main-ui');

            if(!guess) return alert("You must provide a vision to have it crushed.");

            // UI Transition
            interactionArea.classList.add('d-none');
            loader.style.display = 'flex';
            
            // Start rotating status messages
            messageInterval = setInterval(updateStatus, 1800);

            try {
                const response = await fetch('/api/server', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userGuess: guess })
                });
                const data = await response.json();
                
                // Fade out main UI before replacing body
                mainContainer.style.opacity = '0';
                
                setTimeout(() => {
                    clearInterval(messageInterval);
                    document.body.innerHTML = data.html;
                    document.body.style.background = "white"; // Switch to light mode for maximum disappointment
                    document.body.style.color = "black";
                    window.scrollTo(0, 0);
                }, 500);

            } catch (err) {
                clearInterval(messageInterval);
                loader.innerHTML = `<div class="text-danger">Failed to disappoint. Please try again.</div>`;
                interactionArea.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
