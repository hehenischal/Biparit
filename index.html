<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biparit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: white; transition: 0.5s; }
        .glass-input { background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 15px; padding: 15px; }
        .modern-btn { border-radius: 12px; font-weight: bold; padding: 12px 30px; }
        #dynamic-content { margin-top: 50px; min-height: 200px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container text-center" style="max-width: 600px;">
        <h1 class="display-3 fw-bold mb-4">What is this?</h1>
        <p class="lead text-secondary mb-5">Guess what this website is about...</p>
        
        <div class="input-group mb-3">
            <input type="text" id="userGuess" class="form-control glass-input" placeholder="e.g. A cat blog">
            <button class="btn btn-primary modern-btn" id="goBtn" onclick="generateOpposite()">Reveal Truth</button>
        </div>

        <div id="loader" class="d-none mt-4">
            <div class="spinner-border text-info" role="status"></div>
            <p class="mt-2">THINKINGGGGGGGGG VERY VERY HARD</p>
        </div>

        <div id="dynamic-content"></div>
    </div>

    <script>
        async function generateOpposite() {
            const guess = document.getElementById('userGuess').value;
            const contentDiv = document.querySelector('body');
            const loader = document.getElementById('loader');

            if(!guess) return alert("Make a guess first!");

            loader.classList.remove('d-none');
            contentDiv.innerHTML = '';

            try {
                const response = await fetch('/api/server', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userGuess: guess })
                });
                const data = await response.json();
                
                // Inject the HTML
                contentDiv.innerHTML = data.html;
                
                // Smooth scroll to results
                window.scrollTo({ top: contentDiv.offsetTop, behavior: 'smooth' });
            } catch (err) {
                contentDiv.innerHTML = `<div class="alert alert-danger">Error connecting to server.</div>`;
            } finally {
                loader.classList.add('d-none');
            }
        }
    </script>
</body>
</html>
